    <body>
        <form action = "/radio">
            <div>
                <input type = "radio" name = "fruits" id = "apple" value = "apple">
                <label for = "apple">Apple</label>
                <input type = "radio" name = "fruits" id = "banana" value = "banana">
                <label for = "apple">Banana</label>
                <input type = "radio" name = "fruits" id = "orange" value = "orange">
                <label for = "apple">Orange</label>
            </div>

            <div>
                <label for = "profession"> choose your profession:</label>
                <select name = "profession" id = "profession">
                    <option>Select</option>
                    <option value = "student" > Student</option>
                    <option value = "dev">Developer</option>
                </select>
            </div>
            <div>
                <label for = "volume">Volume</label>
                <input type = "range" min = "0" max = "100" id = "volume" name = "vol" step = "10" value = "10">
            </div>
            <div>
                <label for = "feedback" >Feedback</label>
                <textarea id = "feedback" name = "feedback" placeholder = "feedback" rows = 10 cols = 30></textarea>
            </div>
            <button>submit</button>
        </form> 
    </body>
